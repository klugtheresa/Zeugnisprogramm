function makebuben(d) {
  const r = {};
  // Anlagen 1,2,3: special male text
  r.anlagen1 = d.anlagen1.map(([t,l])=>[t
    .replace("ist eine","ist ein")
    .replace(/e([, ]+)$/,"er$1"), l]);
  r.anlagen2 = d.anlagen2.map(([t,l])=>[t.replace(/e /g,"er "), l]);
  r.anlagen3 = d.anlagen3.map(([t,l])=>[t.replace("Schülerin","Schüler")
    .replace(/e Schüler/,"er Schüler")
    .replace(/te Schüler/,"ter Schüler"), l]);
  // Qualifikation: die→der/der→er
  r.qualifikation = d.qualifikation.map(([t,l])=>[t
    .replace(/, die /g,", der ")
    .replace(/, der es/,", dem es"), l]);
  // Begabungen
  r.begabungen = d.begabungen.map(([t,l])=>[t
    .replace("Sie fällt","Er fällt")
    .replace("Sie fiel","Er fiel")
    .replace("Sie erfreut","Er erfreut")
    .replace("Sie erfreute","Er erfreute")
    .replace("Ihre ","Seine ")
    .replace("Sie zeigt","Er zeigt")
    .replace("Sie zeigte","Er zeigte")
    .replace("Ihr ","Sein "), l]);
  // Mitarbeit
  r.mitarbeit = d.mitarbeit.map(([t,l])=>[t
    .replace("Sie zeigt","Er zeigt")
    .replace("Sie zeigte","Er zeigte")
    .replace("Sie fasst","Er fasst")
    .replace("Sie fasste","Er fasste")
    .replace("ihres Interesses","seines Interesses")
    .replace("sie eine","er eine")
    .replace("ihr Wissen","sein Wissen")
    .replace("Sie muss","Er muss")
    .replace("Sie musste","Er musste"), l]);
  // Schulische Aufgaben
  r.schul_aufgaben = d.schul_aufgaben.map(([t,l])=>[t
    .replace("ihres Arbeitsmateriales","seines Arbeitsmateriales")
    .replace("ihrer Unterlagen","seiner Unterlagen")
    .replace("könnte sie den","könnte er den")
    .replace("könnte sie ihren","könnte er seinen"), l]);
  // Häuslich
  if (d.haeuslich) r.haeuslich = d.haeuslich.map(([t,l])=>[t
    .replace("ihrer häuslichen","seiner häuslichen")
    .replace("sie ein","er ein")
    .replace("sie gewissenhaft","er gewissenhaft")
    .replace("sie mit Gewissenhaftigkeit","er mit Gewissenhaftigkeit")
    .replace("sie weitgehend","er weitgehend")
    .replace("sie in der Regel","er in der Regel")
    .replace("sie nicht immer","er nicht immer"), l]);
  // Hausaufgaben
  if (d.hausaufgaben) r.hausaufgaben = d.hausaufgaben.map(([t,l])=>[t
    .replace("ihrer Hausaufgaben","seiner Hausaufgaben")
    .replace("sie selbstständig","er selbstständig")
    .replace("bewies sie","bewies er")
    .replace("Ihre Hausaufgaben","Seine Hausaufgaben")
    .replace("sie gewissenhaft","er gewissenhaft")
    .replace("sie mit Gewissenhaftigkeit","er mit Gewissenhaftigkeit")
    .replace("sie weitgehend","er weitgehend")
    .replace("sie in der Regel","er in der Regel")
    .replace("sie nicht immer","er nicht immer"), l]);
  // Teamarbeit
  r.teamarbeit = d.teamarbeit.map(([t,l])=>[t
    .replace("Die Schülerin","Der Schüler")
    .replace("sie das Team","er das Team")
    .replace("sie sehr","er sehr")
    .replace(/ihren? /g,"seinen Klassenkamerad").replace("seine Klassenkamarad","seinen Klassenkamerad")
    .replace("ihre Klassenkamer","seine Klassenkamer"), l]);
  // Verhalten1
  r.verhalten1 = d.verhalten1.map(([t,l])=>[t
    .replace("Sie verdient","Er verdient")
    .replace("Sie verdiente","Er verdiente")
    .replace("Ihr äußerst","Sein äußerst")
    .replace("Ihr höfliches","Sein höfliches")
    .replace("Ihr Verhalten","Sein Verhalten"), l]);
  // Verhalten2
  r.verhalten2 = d.verhalten2.map(([t,l])=>[t
    .replace("Sie zeigt","Er zeigt")
    .replace("Sie zeigte","Er zeigte")
    .replace("ihr Verhalten","sein Verhalten")
    .replace("Ihr Verhalten","Sein Verhalten"), l]);
  // Klasse
  r.klasse = d.klasse.map(([t,l])=>[t
    .replace("Die Schülerin","Der Schüler")
    .replace("Klassensprecherin","Klassensprecher"), l]);
  // Schule
  r.schule = d.schule.map(([t,l])=>[t
    .replace("Die Schülerin","Der Schüler")
    .replace("ihr begeistertes","sein begeistertes")
    .replace("ihren begeisterten","seinen begeisterten")
    .replace("sie das Schulleben","er das Schulleben")
    .replace("als Tutorin","als Tutor"), l]);
  // Wahlfach
  r.wahlfach1 = d.wahlfach1.map(([t,l])=>[t.replace("Die Schülerin","Der Schüler"),l]);
  r.wahlfach2 = d.wahlfach2;
  // LSK
  r.lsk = d.lsk.map(([t,l])=>[t.replace("Die Schülerin","Der Schüler"),l]);
  // Leistung
  r.leistung = d.leistung.map(([t,l])=>[t
    .replace("ihr Leistungsstand","sein Leistungsstand")
    .replace(", ihr Leistungsstand",", sein Leistungsstand")
    .replace("Die Schülerin","Der Schüler")
    .replace("befreit.","befreit."), l]);
  r.noten10 = d.noten10 ? d.noten10.map(([t,l])=>[t.replace("Die Schülerin","Der Schüler"),l]) : [];
  r.epochal = d.epochal || [];
  r.notenschutz = d.notenschutz.map(([t,l])=>[t,l]);
  r.bilingual = d.bilingual;
  r.hausaufgaben = r.hausaufgaben || [];
  return r;
}

  ["[NAME] war eine sehr unbeschwerte","unbeschwert"],
  ["[NAME] war eine meist unruhige","unruhig"],
  ["[NAME] war eine sehr verschlossene","verschlossen"],
  ["[NAME] war eine oft noch verspielte","verspielt"],
  ["[NAME] war eine manchmal verträumte","verträumt"],
  ["[NAME] war eine in jeder Hinsicht zurückhaltende","zurückhaltend"],
];
const extra58_maedchen_a2 = extra58_maedchen_a1.map(([t,l])=>[
  ", " + t.replace("[NAME] war eine ","").trim().replace(/ $/, " "), l
]).map(([t,l])=>[t+ " ",l]);
const extra58_maedchen_a3 = extra58_maedchen_a1.map(([t,l])=>[
  "und " + t.replace("[NAME] war eine ","").trim() + " Schülerin", l
]);

DATA.jz_maedchen_5_8 = JSON.parse(JSON.stringify(DATA.jz_maedchen_9_10));
DATA.jz_maedchen_5_8.anlagen1 = [...DATA.jz_maedchen_9_10.anlagen1, ...extra58_maedchen_a1];
DATA.jz_maedchen_5_8.anlagen2 = [...DATA.jz_maedchen_9_10.anlagen2, ...extra58_maedchen_a2];
DATA.jz_maedchen_5_8.anlagen3 = [...DATA.jz_maedchen_9_10.anlagen3, ...extra58_maedchen_a3];
DATA.jz_maedchen_5_8.noten10 = [];
DATA.jz_maedchen_5_8.epochal = [];
// For 5-8, haeuslich is empty, hausaufgaben is used
DATA.jz_maedchen_5_8.haeuslich = [];

DATA.jz_buben_5_8 = makebuben(DATA.jz_maedchen_5_8);
DATA.jz_buben_5_8.anlagen1 = DATA.jz_maedchen_5_8.anlagen1.map(([t,l])=>[
  t.replace("war eine","war ein").replace(/e([, ]+)$/,"er$1"),l]);
DATA.jz_buben_5_8.anlagen2 = DATA.jz_maedchen_5_8.anlagen2.map(([t,l])=>[t.replace(/e /g,"er "),l]);
DATA.jz_buben_5_8.anlagen3 = DATA.jz_maedchen_5_8.anlagen3.map(([t,l])=>[
  t.replace("Schülerin","Schüler").replace(/e Schüler/,"er Schüler").replace(/te Schüler/,"ter Schüler"),l]);
DATA.jz_buben_5_8.noten10 = [];
DATA.jz_buben_5_8.epochal = [];
DATA.jz_buben_5_8.haeuslich = [];

// ============================================================
// UI LOGIC
// ============================================================
let currentMain = 'zz';
let currentSub = { zz: 'maedchen_9_10', jz: 'maedchen_5_8' };

function switchMain(m) {
  currentMain = m;
  document.querySelectorAll('.main-tab').forEach((t,i)=> t.classList.toggle('active', ['zz','jz'][i]===m));
  document.getElementById('subtabs-zz').classList.toggle('panel-hidden', m!=='zz');
  document.getElementById('subtabs-jz').classList.toggle('panel-hidden', m!=='jz');
  loadData();
}

function switchSub(main, sub) {
  currentSub[main] = sub;
  const tabs = document.querySelectorAll(`#subtabs-${main} .sub-tab`);
  const keys = main==='zz' ? ['maedchen_9_10','buben_9_10'] : ['maedchen_5_8','maedchen_9_10','buben_5_8','buben_9_10'];
  tabs.forEach((t,i)=> t.classList.toggle('active', keys[i]===sub));
  loadData();
}

function getKey() {
  return `${currentMain}_${currentSub[currentMain]}`;
}

function is58() {
  return currentSub[currentMain].includes('5_8');
}

function is910() {
  return currentSub[currentMain].includes('9_10');
}

function fillSelect(id, items, emptyLabel='– keine –') {
  const sel = document.getElementById(id);
  sel.innerHTML = `<option value="">– ${emptyLabel} –</option>`;
  if (!items || items.length === 0) return;
  items.forEach(([text, label], i) => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = (i+1) + '. ' + label;
    sel.appendChild(o);
  });
}

function loadData() {
  const key = getKey();
  const d = DATA[key];
  if (!d) { console.warn('No data for', key); return; }

  fillSelect('anlagen1', d.anlagen1, 'nicht auswählen');
  fillSelect('anlagen2', d.anlagen2, 'nicht auswählen');
  fillSelect('anlagen3', d.anlagen3, 'nicht auswählen');
  fillSelect('qualifikation', d.qualifikation, 'kein Zusatz');
  fillSelect('begabungen', d.begabungen);
  fillSelect('mitarbeit', d.mitarbeit);
  fillSelect('schul_aufgaben', d.schul_aufgaben);

  // Häuslich vs Hausaufgaben
  const rowH = document.getElementById('row_haeuslich');
  const rowHA = document.getElementById('row_hausaufgaben');
  if (is58()) {
    rowH.style.display = 'none';
    rowHA.style.display = '';
    fillSelect('hausaufgaben', d.hausaufgaben);
  } else {
    rowH.style.display = '';
    rowHA.style.display = 'none';
    fillSelect('haeuslich', d.haeuslich);
  }

  fillSelect('teamarbeit', d.teamarbeit);
  fillSelect('verhalten1', d.verhalten1);
  fillSelect('verhalten2', d.verhalten2);
  fillSelect('klasse', d.klasse);
  fillSelect('schule', d.schule);
  fillSelect('wahlfach1', d.wahlfach1, 'keiner');
  fillSelect('wahlfach2', d.wahlfach2);
  fillSelect('lsk', d.lsk);
  fillSelect('leistung', d.leistung);

  const rowN10 = document.getElementById('row_noten10');
  const rowEp = document.getElementById('row_epochal');
  if (is910()) {
    rowN10.style.display = '';
    rowEp.style.display = '';
    fillSelect('noten10', d.noten10);
    fillSelect('epochal', d.epochal);
  } else {
    rowN10.style.display = 'none';
    rowEp.style.display = 'none';
  }

  fillSelect('notenschutz', d.notenschutz);
  fillSelect('bilingual', d.bilingual);
  generate();
}

function getVal(id) {
  const sel = document.getElementById(id);
  return sel.value === '' ? null : parseInt(sel.value);
}

function getText(id, dataKey) {
  const i = getVal(id);
  if (i === null) return '';
  const key = getKey();
  const d = DATA[key];
  if (!d || !d[dataKey] || !d[dataKey][i]) return '';
  return d[dataKey][i][0];
}

function generate() {
  const name = document.getElementById('schuelername').value.trim() || '[NAME]';
  let text = '';

  // Anlagen sentence
  const a1 = getText('anlagen1', 'anlagen1');
  const a2 = getText('anlagen2', 'anlagen2');
  const a3 = getText('anlagen3', 'anlagen3');
  const qual = getText('qualifikation', 'qualifikation');

  if (a1 || a3) {
    let anlage = '';
    if (a1) anlage = a1;
    if (a1 && a2) anlage += a2;
    if (a3) {
      if (!anlage) {
        anlage = 'und ' + a3;
      } else {
        // a2 endet mit Leerzeichen; fehlt a2, brauchen wir ein eigenes
        anlage += (a2 ? '' : ' ') + a3;
      }
    }
    if (qual) {
      // Hängendes Leerzeichen von a2 vor ". " oder ", die..." entfernen
      anlage = anlage.trimEnd() + qual;
    } else if (anlage) {
      anlage = anlage.trimEnd() + '. ';
    }
    text += anlage;
  }

  // Begabungen
  const beg = getText('begabungen', 'begabungen');
  if (beg) text += beg;

  // Mitarbeit
  const mit = getText('mitarbeit', 'mitarbeit');
  if (mit) text += mit;

  // Schulische Aufgaben
  const sa = getText('schul_aufgaben', 'schul_aufgaben');
  if (sa) text += sa;

  // Häuslich / Hausaufgaben
  if (is58()) {
    const ha = getText('hausaufgaben', 'hausaufgaben');
    if (ha) text += ha;
  } else {
    const hv = getText('haeuslich', 'haeuslich');
    if (hv) text += hv;
  }

  // Teamarbeit
  const team = getText('teamarbeit', 'teamarbeit');
  if (team) text += team;

  // Verhalten
  const v1 = getText('verhalten1', 'verhalten1');
  if (v1) text += v1;
  const v2 = getText('verhalten2', 'verhalten2');
  if (v2) text += v2;

  // Klasse/Schule
  const kl = getText('klasse', 'klasse');
  if (kl) text += kl;
  const sc = getText('schule', 'schule');
  if (sc) text += sc;

  // Wahlfach
  const wf1 = getText('wahlfach1', 'wahlfach1');
  const wf2 = getText('wahlfach2', 'wahlfach2');
  if (wf1 && wf2) text += wf1 + wf2;
  else if (wf1) text += wf1 + ' teil. ';

  // LSK
  const lsk = getText('lsk', 'lsk');
  if (lsk) text += lsk;

  // Leistungsversäumnisse
  const lv = getText('leistung', 'leistung');
  if (lv) text += lv;

  // Notenübernahme 10 (only 9-10)
  if (is910()) {
    const n10 = getText('noten10', 'noten10');
    if (n10) text += n10;
    const ep = getText('epochal', 'epochal');
    if (ep) text += ep;
  }

  // Notenschutz
  const ns = getText('notenschutz', 'notenschutz');
  if (ns) text += ns;

  // Bilingual
  const bi = getText('bilingual', 'bilingual');
  if (bi) text += bi;

  // Replace [NAME]
  text = text.replace(/\[NAME\]/g, name).trim();
  // Clean up extra spaces
  text = text.replace(/  +/g, ' ').replace(/ \./g, '.').replace(/ ,/g, ',');

  document.getElementById('output').value = text;
}

function copyText() {
  const ta = document.getElementById('output');
  ta.select();
  document.execCommand('copy');
  const msg = document.getElementById('copy-msg');
  msg.style.display = 'block';
  setTimeout(()=> msg.style.display='none', 2000);
}

function clearAll() {
  document.getElementById('schuelername').value = '';
  ['anlagen1','anlagen2','anlagen3','qualifikation','begabungen','mitarbeit',
   'schul_aufgaben','haeuslich','hausaufgaben','teamarbeit','verhalten1','verhalten2',
   'klasse','schule','wahlfach1','wahlfach2','lsk','leistung','noten10','epochal',
   'notenschutz','bilingual'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  generate();
}

// Initial load
loadData();
</script>
</body>
</html>
